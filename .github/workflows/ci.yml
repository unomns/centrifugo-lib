name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        laravel: ["10.*", "11.*", "12.*"]
        exclude:
          - php: "8.2"
            laravel: "12.*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.laravel }}" == "10.*" ]]; then TESTBENCH="^8.6"; fi
          if [[ "${{ matrix.laravel }}" == "11.*" ]]; then TESTBENCH="^9.0"; fi
          if [[ "${{ matrix.laravel }}" == "12.*" ]]; then TESTBENCH="^10.0"; fi
          composer update --prefer-dist --no-interaction \
            --with "laravel/framework:${{ matrix.laravel }}" \
            --with "orchestra/testbench:${TESTBENCH}"

      - name: Run tests
        run: ./vendor/bin/phpunit

  static:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction \
            --with "laravel/framework:^11.0" \
            --with "orchestra/testbench:^9.0"

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Pint
        run: ./vendor/bin/pint --test
