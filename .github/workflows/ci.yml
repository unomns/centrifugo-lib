name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        laravel: ["10.*", "11.*", "12.*"]
        exclude:
          - php: "8.2"
            laravel: "12.*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, json
          coverage: none

      - name: Install dependencies
        run: |
          TESTBENCH=$(echo "${{ matrix.laravel }}" | sed 's/10\.\*/^8.6/' | sed 's/11\.\*/^9.0/' | sed 's/12\.\*/^10.0/')
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${TESTBENCH}" --no-interaction --no-update
          composer install --prefer-dist --no-interaction --no-audit

      - name: Run tests
        run: ./vendor/bin/phpunit

  static:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:^11.0" "orchestra/testbench:^9.0" --no-interaction --no-update
          composer install --prefer-dist --no-interaction --no-audit

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Pint
        run: ./vendor/bin/pint --test
